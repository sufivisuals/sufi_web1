<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Premium Thumbnail Extractor</title>
  <style>
    body {
      background: #0b0b0b;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      font-weight: 700;
      color: #c5a880;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 20px;
      margin-bottom: 30px;
    }
    .status-bar {
      background: rgba(197, 168, 128, 0.1);
      border: 1px solid rgba(197, 168, 128, 0.3);
      padding: 16px;
      border-radius: 8px;
      font-size: 1.1rem;
      margin-bottom: 40px;
      color: #c5a880;
    }
    .video-item {
      background: #121212;
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    .video-item h3 {
      margin-top: 0;
      color: #ffffff;
      font-size: 1.2rem;
      margin-bottom: 16px;
    }
    .media-container {
      display: flex;
      gap: 30px;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    video {
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #000;
    }
    canvas {
      border-radius: 8px;
      border: 2px solid #c5a880;
      max-width: 150px;
      box-shadow: 0 0 15px rgba(197, 168, 128, 0.3);
    }
    input[type="file"] {
      display: block;
      margin-bottom: 16px;
      color: #ccc;
    }
    button {
      padding: 12px 24px;
      background: #c5a880;
      color: #0b0b0b;
      border: none;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 20px;
      transition: all 0.2s ease;
    }
    button:hover {
      background: #ffffff;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <h1>Premium Thumbnail Extractor</h1>
  
  <div class="status-bar">
    <strong>Status:</strong> <span id="status">Please select each video file from your Downloads folder to extract thumbnails.</span>
  </div>
  
  <div class="video-item" id="item-1">
    <h3>Video 1 (1.mov)</h3>
    <input type="file" id="file-1" accept="video/*" onchange="loadVideo(1, this)">
    <div class="media-container">
      <video id="v1" width="280" height="400" controls muted style="display:none;"></video>
      <div class="preview-canvas-container" id="preview-1" style="display:none;">
        <strong>Extracted Thumbnail:</strong>
        <div id="c1-container"></div>
      </div>
    </div>
    <button id="btn-1" onclick="extract(1, 'v1')" style="display:none;">Capture Current Frame as Thumbnail</button>
  </div>

  <div class="video-item" id="item-2">
    <h3>Video 2 (2.mp4)</h3>
    <input type="file" id="file-2" accept="video/*" onchange="loadVideo(2, this)">
    <div class="media-container">
      <video id="v2" width="280" height="400" controls muted style="display:none;"></video>
      <div class="preview-canvas-container" id="preview-2" style="display:none;">
        <strong>Extracted Thumbnail:</strong>
        <div id="c2-container"></div>
      </div>
    </div>
    <button id="btn-2" onclick="extract(2, 'v2')" style="display:none;">Capture Current Frame as Thumbnail</button>
  </div>

  <div class="video-item" id="item-3">
    <h3>Video 3 (3.mp4)</h3>
    <input type="file" id="file-3" accept="video/*" onchange="loadVideo(3, this)">
    <div class="media-container">
      <video id="v3" width="280" height="400" controls muted style="display:none;"></video>
      <div class="preview-canvas-container" id="preview-3" style="display:none;">
        <strong>Extracted Thumbnail:</strong>
        <div id="c3-container"></div>
      </div>
    </div>
    <button id="btn-3" onclick="extract(3, 'v3')" style="display:none;">Capture Current Frame as Thumbnail</button>
  </div>

  <script>
    function loadVideo(id, input) {
      const file = input.files[0];
      if (!file) return;
      
      const video = document.getElementById('v' + id);
      const btn = document.getElementById('btn-' + id);
      const preview = document.getElementById('preview-' + id);
      
      video.src = URL.createObjectURL(file);
      video.style.display = 'block';
      btn.style.display = 'inline-block';
      preview.style.display = 'block';
      
      // Auto seek to 1.5 seconds once metadata loads
      video.addEventListener('loadedmetadata', () => {
        video.currentTime = Math.min(1.5, video.duration / 2);
      }, { once: true });
      
      // Auto extract initial frame once seeked
      video.addEventListener('seeked', () => {
        extract(id, 'v' + id);
      }, { once: true });
    }

    function extract(id, videoId) {
      const video = document.getElementById(videoId);
      const canvas = document.createElement('canvas');
      
      canvas.width = video.videoWidth || 360;
      canvas.height = video.videoHeight || 640;
      
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      const container = document.getElementById('c' + id + '-container');
      container.innerHTML = '';
      container.appendChild(canvas);
      
      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      
      const statusDiv = document.getElementById('status');
      statusDiv.innerText = 'Saving thumbnail ' + id + ' to assets folder...';
      
      fetch('/save-thumbnail?name=thumbnail_' + id + '.jpg', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: dataUrl.split(',')[1]
      })
      .then(res => {
        if (res.ok) {
          statusDiv.innerText = 'Thumbnail ' + id + ' saved successfully!';
        } else {
          statusDiv.innerText = 'Failed to save thumbnail ' + id + '.';
        }
      })
      .catch(err => {
        statusDiv.innerText = 'Error sending thumbnail ' + id + ': ' + err;
      });
    }
  </script>
</body>
</html>
